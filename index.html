    function resizeIframe(obj) {
      obj.style.height = obj.contentWindow.document.documentElement.scrollHeight + 'px';
    }
  </script>

</head>

<body>

    src="https://drive.google.com/viewerng/viewer?embedded=true&url=https://raw.githubusercontent.com/stiliajohny/latex-my-cv/gh-pages/Twenty-Seconds_cv.pdf"
    frameborder="0" scrolling="no" onload="resizeIframe(this)"></iframe>
</body>

</html>
